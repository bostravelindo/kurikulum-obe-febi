<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OBE FEBI UINSI Samarinda | LAMEMBA 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        :root {
            --primary-dark: #0a2e1f;
            --primary: #0f4d32;
            --primary-medium: #167349;
            --primary-light: #1d8c5a;
            --gold: #c8963e;
            --gold-light: #e0b865;
            --gold-pale: #fdf3e0;
            --accent-blue: #1e5094;
            --accent-teal: #0d6b6b;
            --bg-main: #f6f8f7;
            --bg-card: #ffffff;
            --bg-sidebar: #081c13;
            --bg-sidebar-hover: #0f3324;
            --text-primary: #1a1f1c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --text-light: #a0aec0;
            --text-sidebar: #cbd5e0;
            --text-sidebar-active: #ffffff;
            --border-color: #e2e8f0;
            --border-light: #edf2f7;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --sidebar-width: 260px;
            --sidebar-collapsed: 72px;
            --header-height: 50px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 13.5px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: var(--transition-slow);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .sidebar-footer-text,
        .sidebar.collapsed .badge-count {
            display: none;
        }
        .sidebar.collapsed .nav-icon {
            margin: 0 auto;
            font-size: 1.3rem;
        }
        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 14px 0;
        }
        .sidebar.collapsed .logo-icon {
            margin: 0 auto;
        }
        .sidebar.collapsed .sidebar-footer {
            justify-content: center;
        }

        .sidebar-header {
            padding: 20px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            background: #08130d;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            padding: 2px;
            box-shadow: 0 4px 12px rgba(200, 150, 62, 0.35);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .logo-text .uni {
            font-size: 0.65rem;
            color: var(--text-light);
            letter-spacing: 0.5px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .logo-text .febi {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .logo-text .obe {
            font-size: 0.6rem;
            color: var(--gold-light);
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .nav-section {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            padding: 14px 10px 6px;
            font-weight: 600;
        }
        .sidebar.collapsed .nav-section {
            display: none;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-sidebar);
            font-weight: 500;
            font-size: 0.9rem;
            position: relative;
            white-space: nowrap;
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover {
            background: var(--bg-sidebar-hover);
            color: #fff;
        }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.2), rgba(200, 150, 62, 0.05));
            color: var(--gold-light);
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--gold);
        }
        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .badge-count {
            margin-left: auto;
            background: var(--gold);
            color: #1a1a1a;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 24px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            cursor: pointer;
            transition: var(--transition);
        }
        .sidebar-footer:hover {
            color: #fff;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            transition: var(--transition-slow);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed+.main-content {
            margin-left: var(--sidebar-collapsed);
        }

        /* ============ TOP HEADER ============ */
        .top-header {
            height: var(--header-height);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
            box-shadow: var(--shadow-sm);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .hamburger {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .hamburger:hover {
            background: var(--bg-main);
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .header-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--gold-pale);
            color: #8b6914;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(200, 150, 62, 0.25);
        }
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse-dot 1.8s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
        }
        .btn-refresh {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: #fff;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-sans);
        }
        .btn-refresh:hover {
            background: var(--bg-main);
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .btn-refresh.spinning i {
            animation: spin 0.7s linear;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .time-display {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }

        /* ============ DASHBOARD CONTENT ============ */
        .dashboard-content {
            padding: 14px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .section-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ============ KPI CARDS ============ */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .kpi-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 13px 15px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            cursor: default;
        }
        .kpi-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: #d4dce4;
        }
        .kpi-card .kpi-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            margin-bottom: 7px;
        }
        .kpi-card .kpi-value {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            line-height: 1;
        }
        .kpi-card .kpi-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }
        .kpi-card .kpi-trend {
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .trend-up {
            background: #ecfdf5;
            color: #059669;
        }
        .trend-down {
            background: #fef2f2;
            color: #dc2626;
        }
        .kpi-accent-stripe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            border-radius: 3px 3px 0 0;
        }
        .stripe-green {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .stripe-gold {
            background: linear-gradient(90deg, #c8963e, #e0b865);
        }
        .stripe-blue {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }
        .stripe-teal {
            background: linear-gradient(90deg, #0d9488, #2dd4bf);
        }

        /* ============ CHARTS AREA ============ */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .charts-grid.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .chart-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 14px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            position: relative;
        }
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        .chart-card .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 9px;
        }
        .chart-card .chart-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }
        .chart-card .chart-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 200px;
        }
        .chart-container.tall {
            height: 232px;
        }
        .chart-container.short {
            height: 168px;
        }

        /* ============ MATRIX TABLE ============ */
        .matrix-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            background: #fff;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            min-width: 700px;
        }
        .matrix-table th,
        .matrix-table td {
            padding: 12px 14px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }
        .matrix-table th {
            background: #f8fafb;
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.75rem;
            letter-spacing: 0.3px;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .matrix-table tbody tr {
            transition: var(--transition);
        }
        .matrix-table tbody tr:hover {
            background: #f9fafb;
        }
        .matrix-table .cell-filled {
            background: #ecfdf5;
            color: #065f46;
            font-weight: 700;
            border-radius: 4px;
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.75rem;
        }
        .matrix-table .cell-empty {
            color: #cbd5e0;
        }
        .highlight-row {
            background: #fffdf5 !important;
        }

        /* ============ SEMESTER ACCORDION ============ */
        .accordion-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .accordion-item {
            background: #fff;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .accordion-header {
            padding: 16px 20px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafbfc;
            transition: var(--transition);
            user-select: none;
            font-size: 0.9rem;
        }
        .accordion-header:hover {
            background: #f0f4f3;
        }
        .accordion-header.active {
            background: #ecfdf5;
            color: var(--primary-dark);
            border-left: 4px solid var(--primary-light);
        }
        .accordion-body {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
        }
        .accordion-body.open {
            max-height: 500px;
            padding: 16px 20px;
        }
        .accordion-body table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        .accordion-body td,
        .accordion-body th {
            padding: 8px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: #1a1f1c;
            color: #fff;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: var(--shadow-xl);
            animation: slideIn 0.4s ease, fadeOut 0.3s ease 2.5s forwards;
            max-width: 380px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        .toast.success {
            border-left: 4px solid #10b981;
        }
        .toast.info {
            border-left: 4px solid #3b82f6;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .charts-grid.three-col {
                grid-template-columns: 1fr 1fr;
            }
            .kpi-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
        @media (max-width: 768px) {
            .sidebar {
                width: var(--sidebar-collapsed);
                transform: translateX(-100%);
            }
            .sidebar.mobile-open {
                transform: translateX(0);
                width: var(--sidebar-width);
                z-index: 1100;
            }
            .sidebar.mobile-open .logo-text,
            .sidebar.mobile-open .nav-label,
            .sidebar.mobile-open .sidebar-footer-text,
            .sidebar.mobile-open .badge-count,
            .sidebar.mobile-open .nav-section {
                display: block;
            }
            .sidebar.mobile-open .nav-item {
                justify-content: flex-start;
                padding: 11px 14px;
            }
            .sidebar.mobile-open .nav-icon {
                margin: 0;
                font-size: 1rem;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .charts-grid.three-col {
                grid-template-columns: 1fr;
            }
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
            }
            .dashboard-content {
                padding: 16px;
                gap: 14px;
            }
            .top-header {
                padding: 0 14px;
            }
            .header-title {
                font-size: 0.85rem;
            }
            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1050;
                display: none;
            }
            .overlay.show {
                display: block;
            }
        }
        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .kpi-card .kpi-value {
                font-size: 1.6rem;
            }
            .header-right .btn-refresh span {
                display: none;
            }
            .chart-container {
                height: 220px;
            }
            .chart-container.tall {
                height: 260px;
            }
        }

        /* ============ PROGRESS BAR ============ */
        .progress-bar-wrap {
            background: #e5e7eb;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .progress-bar-fill.gold {
            background: linear-gradient(90deg, #c8963e, #e0b865);
        }
        .progress-bar-fill.blue {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1cdd7;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a0b0bc;
        }

        /* Print-friendly */
        @media print {
            .sidebar,
            .top-header,
            .btn-refresh,
            .hamburger,
            .toast-container {
                display: none !important;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .dashboard-content {
                padding: 0;
            }
        }
        /* ===== MODAL & EDITOR ===== */
        .modal-overlay{position:fixed;inset:0;background:rgba(8,28,19,.55);backdrop-filter:blur(3px);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
        .modal-overlay.show{display:flex}
        .modal-box{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);width:100%;max-width:560px;padding:24px;animation:modalIn .2s ease}
        @keyframes modalIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
        .modal-box h3{font-size:1.15rem;font-weight:800;color:var(--primary);margin-bottom:4px}
        .modal-box .msub{font-size:.8rem;color:var(--text-muted);margin-bottom:16px}
        .form-row{margin-bottom:13px}
        .form-row label{display:block;font-size:.78rem;font-weight:700;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.02em}
        .form-row input,.form-row select,.form-row textarea{width:100%;font-family:inherit;font-size:.9rem;padding:9px 12px;border:1.5px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);background:#fff;transition:var(--transition)}
        .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(29,140,90,.12)}
        .form-row textarea{min-height:64px;resize:vertical}
        .chk-grid{display:flex;flex-wrap:wrap;gap:8px}
        .chk-grid label{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;text-transform:none;letter-spacing:0;background:var(--bg-main);border:1px solid var(--border-color);padding:6px 11px;border-radius:20px;cursor:pointer;margin:0}
        .chk-grid input{width:auto}
        .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-light)}
        .btn{font-family:inherit;font-weight:700;font-size:.85rem;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:7px}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-medium)}
        .btn-ghost{background:#fff;color:var(--text-secondary);border:1.5px solid var(--border-color)}.btn-ghost:hover{border-color:var(--primary-light);color:var(--primary)}
        .btn-danger{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca}.btn-danger:hover{background:#fee2e2}
        .btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#b3842f}
        .row-actions{display:inline-flex;gap:6px}
        .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border-color);background:#fff;cursor:pointer;color:var(--text-secondary);transition:var(--transition);font-size:.8rem}
        .icon-btn:hover{border-color:var(--primary-light);color:var(--primary);background:var(--bg-main)}
        .icon-btn.del:hover{border-color:#fecaca;color:#dc2626;background:#fef2f2}
        .data-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:20px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
        .data-card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
        .data-card-head h3{font-size:1rem;font-weight:800;color:var(--text-primary);display:flex;align-items:center;gap:8px}
        .inline-input{width:64px;padding:5px 7px;border:1px solid var(--border-color);border-radius:6px;font-family:inherit;font-size:.82rem;text-align:center}
        .inline-input.wide{width:100%;text-align:left}
        .dim-status{padding:3px 9px;border-radius:10px;font-weight:700;font-size:.72rem}
        .st-ok{background:#ecfdf5;color:#065f46}.st-warn{background:#fefce8;color:#8b6914}.st-bad{background:#fef2f2;color:#dc2626}
        .export-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
        .export-tile{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:22px;text-align:center;box-shadow:var(--shadow-sm);transition:var(--transition);cursor:pointer}
        .export-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
        .export-tile .ic{font-size:2.4rem;margin-bottom:10px}
        .export-tile h4{font-size:.95rem;font-weight:800;color:var(--text-primary)}
        .export-tile p{font-size:.76rem;color:var(--text-muted);margin-top:4px}
        .report-preview{background:#fff;border:1px solid var(--border-color);border-radius:var(--radius-md);padding:30px;box-shadow:var(--shadow-sm);max-height:640px;overflow-y:auto}
        .report-preview h1,.report-preview h2,.report-preview h3{font-family:var(--font-sans)}
        .report-preview table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.8rem}
        .report-preview th,.report-preview td{border:1px solid #cbd5e0;padding:6px 9px;text-align:left}
        .report-preview th{background:#0f4d32;color:#fff;font-weight:700}
        .upload-zone{border:2px dashed var(--border-color);border-radius:var(--radius-md);padding:20px;text-align:center;color:var(--text-muted);font-size:.85rem}
        @media print{
            body *{visibility:hidden}
            #printArea,#printArea *{visibility:visible}
            #printArea{position:absolute;left:0;top:0;width:100%;padding:0}
            .sidebar,.top-header,.toast-container{display:none!important}
        }
        /* ===== Auto-fit berdasar TINGGI layar: jamin dashboard penuh tanpa scroll ===== */
        @media (max-height: 920px) {
            html { font-size: 13px; }
            :root { --header-height: 46px; }
            .dashboard-content { padding: 12px 14px; gap: 12px; }
            .chart-container { height: 178px; }
            .chart-container.tall { height: 205px; }
            .chart-container.short { height: 150px; }
            .kpi-card { padding: 11px 14px; }
            .kpi-card .kpi-icon { width: 32px; height: 32px; margin-bottom: 5px; }
            .kpi-card .kpi-value { font-size: 1.55rem; }
            .chart-card { padding: 12px; }
            .chart-card .chart-header { margin-bottom: 7px; }
            .charts-grid { gap: 12px; }
        }
        @media (max-height: 780px) {
            html { font-size: 12.5px; }
            :root { --header-height: 42px; }
            .dashboard-content { padding: 10px 12px; gap: 10px; }
            .chart-container { height: 150px; }
            .chart-container.tall { height: 172px; }
            .chart-container.short { height: 128px; }
            .kpi-card { padding: 9px 12px; }
            .kpi-card .kpi-icon { width: 28px; height: 28px; margin-bottom: 4px; }
            .kpi-card .kpi-value { font-size: 1.4rem; }
            .kpi-card .kpi-label { margin-top: 2px; }
            .kpi-card .kpi-trend { margin-top: 5px; }
            .section-header { gap: 6px; }
        }
    </style>
</head>

            function renderReport() {
                dashboardContent.innerHTML =
                '<div class="section-header"><div><h2 class="section-title">📤 Ekspor &amp; Cetak Laporan</h2><p class="section-subtitle">Laporan kinerja & kesiapan akreditasi LAMEMBA — rapi & siap dibaca asesor</p></div></div>' +
                '<div class="data-card" style="background:linear-gradient(135deg,#f0fdf4,#f8fafb);border-color:#d1fae5;"><div style="font-size:.85rem;color:#4a5568;"><i class="fa-solid fa-circle-info" style="color:#059669;"></i> <b>Word/PDF</b> menghasilkan laporan prodi aktif (<b>' + esc(P().nama) + '</b>) + rekap fakultas. <b>Excel</b> mencakup <b>seluruh ' + STORE.prodi.length + ' prodi</b>.</div></div>' +
                '<div class="export-grid">' +
                '<div class="export-tile" onclick="window.exportExcel()"><div class="ic">📊</div><h4>Excel (.xlsx)</h4><p>Rekap fakultas + semua prodi</p></div>' +
                '<div class="export-tile" onclick="window.exportWord()"><div class="ic">📝</div><h4>Word (.doc)</h4><p>Laporan ' + esc(P().kode) + ' siap sunting</p></div>' +
                '<div class="export-tile" onclick="window.printReport()"><div class="ic">🖨️</div><h4>PDF / Cetak</h4><p>Simpan sebagai PDF</p></div>' +
                '<div class="export-tile" onclick="window.exportJSON()"><div class="ic">💾</div><h4>Cadangan JSON</h4><p>Seluruh data fakultas</p></div></div>' +
                '<div class="data-card"><div class="data-card-head"><h3><i class="fa-solid fa-eye"></i> Pratinjau Laporan — ' + esc(P().nama) + '</h3><span class="header-badge" style="font-size:.72rem;">' + F().tahun + '</span></div><div class="report-preview">' + buildReportHTML() + '</div></div>';
            }
            function facultyRekapRows() { return STORE.prodi.map(p => { const ov = overallStatusOf(p); return '<tr><td style="text-align:center;">' + esc(p.kode) + '</td><td>' + esc(p.nama) + '</td><td style="text-align:center;">' + avgKesiapanOf(p).toFixed(1) + '%</td><td style="text-align:center;">' + ov.t + '</td><td style="text-align:center;">' + p.courses.length + '</td><td style="text-align:center;">' + Number(p.mahasiswaAktif).toLocaleString('id-ID') + '</td></tr>'; }).join(''); }
            function buildReportHTML() {
                const m = M(), p = P(), ov = overallStatus(), now = new Date();
                const critBlocks = p.criteria.map(c => { const sc = critScore(c), st = critStatus(c); const dims = c.dimensi.map(d => { const ds = dimStatus(Number(d.kesiapan) || 0); return '<tr><td>' + esc(d.nama) + '</td><td style="text-align:center;">' + d.kesiapan + '%</td><td>' + ds.t + '</td><td>' + (esc(d.bukti) || '-') + '</td><td>' + (esc(d.catatan) || '-') + '</td></tr>'; }).join(''); return '<h3>Kriteria ' + c.id + '. ' + esc(c.nama) + ' <span style="font-weight:400;font-size:.85em;">— kesiapan ' + sc.toFixed(1) + '%, status: <b>' + st.t + '</b></span></h3><table><thead><tr><th>Dimensi</th><th>Kesiapan</th><th>Status</th><th>Bukti/Dokumen</th><th>Catatan Tindak Lanjut</th></tr></thead><tbody>' + dims + '</tbody></table>'; }).join('');
                const rekap = p.criteria.map(c => { const st = critStatus(c); return '<tr><td style="text-align:center;">' + c.id + '</td><td>' + esc(c.nama) + '</td><td style="text-align:center;">' + c.dimensi.length + '</td><td style="text-align:center;">' + critScore(c).toFixed(1) + '%</td><td style="text-align:center;">' + st.t + '</td></tr>'; }).join('');
                const matriks = p.courses.map(c => '<tr><td>' + esc(c.kode) + '</td><td>' + esc(c.nama) + '</td><td style="text-align:center;">' + c.sem + '</td>' + p.cpl.map((_, j) => '<td style="text-align:center;">' + (c.cpl[j] ? '✓' : '') + '</td>').join('') + '</tr>').join('');
                const kurikulum = [...new Set(p.courses.map(c => c.sem))].sort((a, b) => a - b).map(sem => { const list = p.courses.filter(c => c.sem === sem); const sks = list.reduce((a, c) => a + c.sks, 0); return '<tr><td style="text-align:center;">' + sem + '</td><td>' + list.map(c => c.kode + ' ' + c.nama + ' (' + c.sks + ')').join('; ') + '</td><td style="text-align:center;">' + sks + '</td></tr>'; }).join('');
                const cplT = p.cpl.map(c => '<tr><td>' + esc(c.id) + '</td><td>' + esc(c.nama) + '</td><td style="text-align:center;">' + c.capaian + '%</td></tr>').join('');
                const mhs = p.students.map(s => '<tr><td>' + esc(s.nim) + '</td><td>' + esc(s.nama) + '</td><td>' + esc(s.prodi) + '</td><td style="text-align:center;">' + s.cplAvg + '%</td><td>' + esc(s.status) + '</td></tr>').join('');
                return '<div style="text-align:center;margin-bottom:18px;"><div style="font-size:1.3rem;font-weight:800;color:#0f4d32;">DOKUMEN KINERJA & KESIAPAN AKREDITASI</div><div style="font-size:1.05rem;font-weight:700;">LAMEMBA ' + m.tahun + ' — Status Terakreditasi</div><div style="margin-top:6px;">' + esc(m.pt) + '<br>' + esc(m.upps) + ' — Program Studi ' + esc(m.prodi) + ' (' + esc(m.jenjang) + ')</div></div>' +
                '<table><tbody><tr><th style="width:34%;">Perguruan Tinggi</th><td>' + esc(m.pt) + '</td></tr><tr><th>Unit Pengelola</th><td>' + esc(m.upps) + '</td></tr><tr><th>Program Studi</th><td>' + esc(m.prodi) + ' (' + esc(m.jenjang) + ')</td></tr><tr><th>Alamat</th><td>' + esc(m.alamat) + ', ' + esc(m.kota) + '</td></tr><tr><th>Kontak</th><td>' + esc(m.telp) + ' • ' + esc(m.email) + ' • ' + esc(m.website) + '</td></tr><tr><th>Akreditasi Terakhir</th><td>' + esc(m.akreditasiTerakhir) + (m.skLam && m.skLam !== '-' ? ' (SK ' + esc(m.skLam) + ')' : '') + '</td></tr><tr><th>Mahasiswa Aktif</th><td>' + Number(m.mahasiswaAktif).toLocaleString('id-ID') + '</td></tr></tbody></table>' +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Rekap Fakultas (' + STORE.prodi.length + ' Program Studi)</h2><table><thead><tr><th style="text-align:center;">Kode</th><th>Program Studi</th><th style="text-align:center;">Indeks Kesiapan</th><th style="text-align:center;">Proyeksi Status</th><th style="text-align:center;">Jml MK</th><th style="text-align:center;">Mhs Aktif</th></tr></thead><tbody>' + facultyRekapRows() + '</tbody></table>' +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Ringkasan 5 Kriteria — ' + esc(m.prodi) + '</h2><p style="font-size:.85rem;">Indeks kesiapan <b>' + avgKesiapan().toFixed(1) + '%</b>. Proyeksi luaran: <b>' + ov.t + '</b> — ' + esc(ov.desc) + '. Dasar: Permendiktisaintek No. 39 Tahun 2025; instrumen LAMEMBA untuk Status Terakreditasi (12 Januari 2026).</p><table><thead><tr><th style="width:6%;text-align:center;">No</th><th>Kriteria</th><th style="text-align:center;">Dimensi</th><th style="text-align:center;">Kesiapan</th><th style="text-align:center;">Status</th></tr></thead><tbody>' + rekap + '</tbody></table>' +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Rincian per Kriteria</h2>' + critBlocks +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Struktur Kurikulum</h2><table><thead><tr><th style="text-align:center;width:10%;">Sem</th><th>Mata Kuliah (SKS)</th><th style="text-align:center;width:12%;">Total SKS</th></tr></thead><tbody>' + kurikulum + '</tbody></table>' +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Peta Kurikulum — Matriks CPL × MK</h2><table><thead><tr><th>Kode</th><th>Mata Kuliah</th><th style="text-align:center;">Sem</th>' + p.cpl.map(c => '<th style="text-align:center;">' + esc(c.id) + '</th>').join('') + '</tr></thead><tbody>' + matriks + '</tbody></table>' +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Capaian Pembelajaran Lulusan</h2><table><thead><tr><th style="width:14%;">Kode</th><th>Deskripsi</th><th style="text-align:center;width:14%;">Capaian</th></tr></thead><tbody>' + cplT + '</tbody></table>' +
                '<h2 style="color:#0f4d32;border-bottom:2px solid #0f4d32;padding-bottom:4px;">Monitoring Mahasiswa</h2><table><thead><tr><th>NIM</th><th>Nama</th><th>Prodi</th><th style="text-align:center;">Rata CPL</th><th>Status</th></tr></thead><tbody>' + mhs + '</tbody></table>' +
                '<p style="margin-top:20px;font-size:.8rem;color:#555;">' + esc(m.kota) + ', ' + now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) + ' — Dihasilkan otomatis oleh Dashboard OBE ' + esc(m.upps) + '.</p>';
            }
            window.printReport = function() { const w = window.open('', '_blank'); if (!w) { window.showToast('⚠️ Izinkan pop-up untuk mencetak', 'error'); return; } w.document.write('<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><title>Laporan Akreditasi — ' + esc(P().nama) + '</title><style>body{font-family:Calibri,Arial,sans-serif;color:#1a1f1c;margin:28px;line-height:1.5;font-size:12px}h2{font-size:15px;margin-top:22px}h3{font-size:13px;margin-top:16px;color:#0f4d32}table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px}th,td{border:1px solid #999;padding:5px 7px;text-align:left;vertical-align:top}th{background:#0f4d32;color:#fff}@media print{h2,h3{page-break-after:avoid}tr{page-break-inside:avoid}}</style></head><body>' + buildReportHTML() + '</body></html>'); w.document.close(); setTimeout(() => { w.focus(); w.print(); }, 400); window.showToast('🖨️ Menyiapkan cetak/PDF…', 'info'); };
            window.exportWord = function() { const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>Laporan</title><style>@page{size:A4;margin:2cm}body{font-family:Calibri,Arial,sans-serif;font-size:11pt;line-height:1.5}h2{font-size:14pt;color:#0f4d32}h3{font-size:12pt;color:#0f4d32}table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}th,td{border:1px solid #888;padding:5px 7px;text-align:left}th{background:#0f4d32;color:#fff}</style></head><body>' + buildReportHTML() + '</body></html>'; dl(new Blob(['\ufeff' + html], { type: 'application/msword' }), 'Laporan-Akreditasi-' + slug(P().nama) + '.doc'); window.showToast('📝 Word (.doc) diunduh', 'success'); };
            window.exportExcel = function() {
                if (typeof XLSX === 'undefined') { window.showToast('⚠️ Pustaka Excel belum termuat', 'error'); return; }
                const border = { top: { style: 'thin', color: { rgb: 'BBBBBB' } }, bottom: { style: 'thin', color: { rgb: 'BBBBBB' } }, left: { style: 'thin', color: { rgb: 'BBBBBB' } }, right: { style: 'thin', color: { rgb: 'BBBBBB' } } };
                const H = { fill: { fgColor: { rgb: '0F4D32' } }, font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 10, name: 'Arial' }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border };
                const C = { font: { name: 'Arial', sz: 10 }, border, alignment: { vertical: 'center' } };
                const mk = aoa => { const ws = XLSX.utils.aoa_to_sheet(aoa); const rng = XLSX.utils.decode_range(ws['!ref']); for (let R = rng.s.r; R <= rng.e.r; R++) for (let Col = rng.s.c; Col <= rng.e.c; Col++) { const ad = XLSX.utils.encode_cell({ r: R, c: Col }); const cell = ws[ad]; if (!cell) continue; cell.s = R === 0 ? H : C; } return ws; };
                const wb = XLSX.utils.book_new(); const f = F();
                XLSX.utils.book_append_sheet(wb, mk([['Identitas Fakultas', 'Nilai'], ['Perguruan Tinggi', f.pt], ['UPPS', f.upps], ['Kota', f.kota], ['Tahun', f.tahun], ['Jumlah Prodi', STORE.prodi.length]]), 'Identitas');
                XLSX.utils.book_append_sheet(wb, mk([['Kode', 'Program Studi', 'Jenjang', 'Indeks Kesiapan (%)', 'Proyeksi Status', 'Jml MK', 'Mhs Aktif'], ...STORE.prodi.map(p => [p.kode, p.nama, p.jenjang, +avgKesiapanOf(p).toFixed(1), overallStatusOf(p).t, p.courses.length, p.mahasiswaAktif])]), 'Rekap Fakultas');
                STORE.prodi.forEach(p => {
                    XLSX.utils.book_append_sheet(wb, mk([['No', 'Kriteria', 'Jml Dimensi', 'Kesiapan (%)', 'Status'], ...p.criteria.map(c => [c.id, c.nama, c.dimensi.length, +critScore(c).toFixed(1), critStatus(c).t])]), ('Kriteria-' + p.kode).slice(0, 31));
                    const dim = [['Kriteria', 'Dimensi', 'Kesiapan (%)', 'Status', 'Bukti', 'Catatan']]; p.criteria.forEach(c => c.dimensi.forEach(d => dim.push([c.nama, d.nama, d.kesiapan, dimStatus(Number(d.kesiapan) || 0).t, d.bukti, d.catatan]))); XLSX.utils.book_append_sheet(wb, mk(dim), ('Dimensi-' + p.kode).slice(0, 31));
                    XLSX.utils.book_append_sheet(wb, mk([['Kode', 'Deskripsi CPL', 'Capaian (%)'], ...p.cpl.map(c => [c.id, c.nama, c.capaian])]), ('CPL-' + p.kode).slice(0, 31));
                    XLSX.utils.book_append_sheet(wb, mk([['Kode', 'Mata Kuliah', 'Sem', 'SKS', 'Tipe', ...p.cpl.map(c => c.id)], ...p.courses.map(c => [c.kode, c.nama, c.sem, c.sks, c.tipe, ...p.cpl.map((_, j) => c.cpl[j] ? '✓' : '')])]), ('MK-' + p.kode).slice(0, 31));
                    XLSX.utils.book_append_sheet(wb, mk([['NIM', 'Nama', 'Prodi', 'Rata CPL (%)', 'Status', 'Tren'], ...p.students.map(s => [s.nim, s.nama, s.prodi, s.cplAvg, s.status, s.trend])]), ('Mhs-' + p.kode).slice(0, 31));
                });
                XLSX.writeFile(wb, 'Data-Akreditasi-FEBI-UINSI.xlsx'); window.showToast('📊 Excel (semua prodi) diunduh', 'success');
            };

            // ===== UTIL =====
            function dl(blob, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500); }
            function slug(s) { return String(s || 'prodi').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

            // ===== INIT =====
            mountProdiSwitch();
            renderDashboard();
            setInterval(() => { if (document.getElementById('modalOverlay').classList.contains('show')) return; if (['data', 'report', 'accreditation'].includes(currentTab)) return; destroyAllCharts(); renderTabContent(currentTab); }, 45000);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) { overlay.classList.remove('show'); if (!sidebar.classList.contains('collapsed') && !sidebar.classList.contains('mobile-open')) mainContent.style.marginLeft = '260px'; } else { if (!sidebar.classList.contains('mobile-open')) mainContent.style.marginLeft = '0px'; } });
            if (window.innerWidth <= 768) { mainContent.style.marginLeft = '0px'; sidebar.classList.remove('collapsed'); }
            console.log('✅ Dashboard OBE FEBI UINSI — Multi-Prodi (3) · LAMEMBA 2026 Ready');
        })();
    </script>
</body>
</html>
